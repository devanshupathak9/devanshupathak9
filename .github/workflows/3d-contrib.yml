name: Generate 3D Contribution Graph

on:
  schedule:
    # Regenerate daily at 00:20 UTC
    - cron: '20 0 * * *'
  workflow_dispatch:        # allow manual runs from the Actions tab
  push:
    branches: [ main, master ]   # fires whichever your default branch is

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVGs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib
          if ! git diff --cached --quiet; then
            git commit -m "chore: update 3D contribution graph [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi